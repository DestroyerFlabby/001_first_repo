name: Deploy Render

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          case "$RENDER_DEPLOY_HOOK_URL" in
            https://api.render.com/deploy/*) ;;
            *)
              echo "::error::RENDER_DEPLOY_HOOK_URL must be the Render deploy hook URL, not the public onrender.com app URL."
              exit 1
              ;;
          esac
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
